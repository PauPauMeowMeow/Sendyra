name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  FLET_CLI_NO_RICH_OUTPUT: "1"

jobs:
  build-windows:
    # windows-latest ships a VS version that Flutter 3.29 cannot detect
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install flet[all]==0.28.3
      - run: flet build windows --compile-app --cleanup-app --cleanup-packages --no-rich-output
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Create installer
        shell: powershell
        run: |
          @'
          #define MyAppName "Sendyra"
          #define MyAppVersion "0.1.0"
          #define MyAppPublisher "PauPauMeowMeow"
          #define MyAppExeName "Sendyra.exe"

          [Setup]
          AppId={{7B2D6B1A-0F2A-4B3C-8D1E-2C3A4B5C6D7E}}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          DefaultDirName={autopf}\Sendyra
          OutputBaseFilename=Sendyra-Windows-Setup
          OutputDir=.
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64

          [Files]
          Source: "build\windows\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked

          [Icons]
          Name: "{group}\Sendyra"; Filename: "{app}\Sendyra.exe"
          Name: "{autodesktop}\Sendyra"; Filename: "{app}\Sendyra.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\Sendyra.exe"; Description: "Launch Sendyra"; Flags: nowait postinstall skipifsilent
          '@ | Set-Content -Encoding UTF8 Sendyra.iss
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" Sendyra.iss
      - uses: actions/upload-artifact@v7
        with:
          path: Sendyra-Windows-Setup.exe
          archive: false
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install flet[all]==0.28.3
      - run: flet build macos --arch arm64 --compile-app --cleanup-app --cleanup-packages --no-rich-output
      - name: Create DMG
        run: hdiutil create -volname "Sendyra" -srcfolder "build/macos/Sendyra.app" -ov -format UDBZ Sendyra.dmg
      - uses: actions/upload-artifact@v7
        with:
          path: Sendyra.dmg
          archive: false
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev squashfs-tools
      - run: pip install flet[all]==0.28.3
      - run: flet build linux --compile-app --cleanup-app --cleanup-packages --no-rich-output
      - name: Create AppImage
        run: |
          mkdir -p Sendyra.AppDir/usr/bin
          cp -r build/linux/* Sendyra.AppDir/usr/bin/
          cp assets/icon.png Sendyra.AppDir/sendyra.png
          cat > Sendyra.AppDir/Sendyra.desktop <<'EOF'
          [Desktop Entry]
          Name=Sendyra
          Exec=sendyra
          Icon=sendyra
          Type=Application
          Categories=Utility;
          EOF
          cat > Sendyra.AppDir/AppRun <<'EOF'
          #!/bin/sh
          exec "$(dirname "$0")/usr/bin/sendyra" "$@"
          EOF
          chmod +x Sendyra.AppDir/AppRun
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool --no-appstream Sendyra.AppDir Sendyra-x86_64.AppImage
      - uses: actions/upload-artifact@v7
        with:
          path: Sendyra-x86_64.AppImage
          archive: false
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - run: pip install flet[all]==0.28.3
      - run: flet build apk --compile-app --cleanup-app --cleanup-packages --no-rich-output
      - name: Package
        run: cp build/apk/app-release.apk Sendyra-android.apk
      - uses: actions/upload-artifact@v7
        with:
          path: Sendyra-android.apk
          archive: false
          if-no-files-found: error

  # iOS builds without code signing; installable only via sideload/TestFlight
  build-ios:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install flet[all]==0.28.3
      - run: flet build ipa --compile-app --cleanup-app --cleanup-packages --no-rich-output
      - name: Package IPA
        run: |
          mkdir -p Payload
          if ls build/ipa/*.ipa 1> /dev/null 2>&1; then
            cp build/ipa/*.ipa Sendyra-ios.ipa
          else
            for xcarchive in build/ipa/*.xcarchive; do
              cp -r "$xcarchive/Products/Applications/"*.app Payload/
            done
            zip -r Sendyra-ios.ipa Payload
          fi
      - uses: actions/upload-artifact@v7
        with:
          path: Sendyra-ios.ipa
          archive: false
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
          for f in artifacts/*; do
            gh release upload "${{ github.ref_name }}" "$f" --clobber || true
          done
